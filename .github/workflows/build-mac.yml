name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: google-config.json 복원
        env:
          GOOGLE_CONFIG: ${{ secrets.GOOGLE_CONFIG_JSON }}
        run: |
          if [ -n "$GOOGLE_CONFIG" ]; then
            echo "$GOOGLE_CONFIG" > google-config.json
            echo "✓ google-config.json 복원됨"
          else
            echo "⚠ GOOGLE_CONFIG_JSON 시크릿이 없음 — 더미 생성"
            echo '{"client_id":"DUMMY","client_secret":"DUMMY"}' > google-config.json
          fi

      - name: 의존성 설치
        run: npm install

      - name: macOS 빌드 (.dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PUBLISH_FOR_PULL_REQUEST: false
          EP_PRE_RELEASE: false
        run: npx electron-builder --mac --universal --publish never

      - name: .dmg 업로드
        uses: actions/upload-artifact@v4
        with:
          name: neisme-calendar-mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: GitHub Release 생성 (태그 push 시만)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}