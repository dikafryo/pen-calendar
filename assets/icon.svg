<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8edf3"/>
    </linearGradient>
    <linearGradient id="headerG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7b7b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <linearGradient id="nG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 외곽 그림자 -->
  <rect x="36" y="46" width="184" height="186" rx="32" fill="rgba(0,0,0,0.22)"/>
  
  <!-- 후크 2개 -->
  <rect x="74" y="18" width="14" height="40" rx="7" fill="#475569"/>
  <rect x="74" y="18" width="14" height="6" rx="3" fill="#64748b"/>
  <rect x="168" y="18" width="14" height="40" rx="7" fill="#475569"/>
  <rect x="168" y="18" width="14" height="6" rx="3" fill="#64748b"/>
  
  <!-- 본체 -->
  <rect x="32" y="40" width="192" height="192" rx="28" fill="url(#bodyG)" stroke="#cbd5e1" stroke-width="0.5"/>
  
  <!-- 상단 빨간 헤더 -->
  <path d="M 32 68 Q 32 40 60 40 L 196 40 Q 224 40 224 68 L 224 90 L 32 90 Z" fill="url(#headerG)"/>
  
  <!-- 헤더 상단 하이라이트 -->
  <path d="M 32 68 Q 32 40 60 40 L 196 40 Q 224 40 224 64 L 224 68 L 32 68 Z" fill="rgba(255,255,255,0.28)"/>
  
  <!-- 헤더 하단 그림자선 -->
  <line x1="32" y1="89" x2="224" y2="89" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
  
  <!-- 큰 'n' 글자 (Arial Black 호환) -->
  <text x="128" y="208" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica', 'Pretendard Black', 'Inter', sans-serif"
        font-size="135"
        font-weight="900"
        fill="url(#nG)"
        letter-spacing="-4">n</text>
</svg>
